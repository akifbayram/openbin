  # ════════════════════════════════════════════════════════
  # Bins
  # ════════════════════════════════════════════════════════
  /bins:
    post:
      tags: [Bins]
      summary: Create a bin
      description: |
        Creates a new bin with an auto-generated 6-character alphanumeric ID.
        The ID uses a charset excluding ambiguous characters (0/O, 1/l/I).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBinRequest'
      responses:
        '201':
          description: Bin created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Bins]
      summary: List bins for a location
      description: |
        Returns non-deleted bins. Supports server-side search, filtering, sorting,
        and optional offset-based pagination.

        When `limit` is provided, responses include a `count` field with the total
        number of matching rows (for building pagination UI). When `limit` is absent,
        all matching bins are returned and `count` equals `results.length` (backward
        compatible).
      parameters:
        - name: location_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          schema:
            type: string
          description: Search across bin name, items, notes, tags, ID, and area name
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by exact tag match (use `tags` for multi-tag)
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tag names. Combined with `tag_mode`.
        - name: tag_mode
          in: query
          schema:
            type: string
            enum: [any, all]
            default: any
          description: When filtering by `tags`, require any or all tags to match
        - name: area_id
          in: query
          schema:
            type: string
          description: "Filter by single area. Use '__unassigned__' for bins with no area. See also `areas`."
        - name: areas
          in: query
          schema:
            type: string
          description: "Comma-separated area IDs. Supports '__unassigned__'. Takes precedence over `area_id`."
        - name: colors
          in: query
          schema:
            type: string
          description: Comma-separated color keys to filter by
        - name: has_items
          in: query
          schema:
            type: string
            enum: ['true']
          description: Only return bins that have at least one item
        - name: has_notes
          in: query
          schema:
            type: string
            enum: ['true']
          description: Only return bins with non-empty notes
        - name: needs_organizing
          in: query
          schema:
            type: string
            enum: ['true']
          description: Filter bins missing tags, area, and items
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, created_at, updated_at, area]
            default: updated_at
        - name: sort_dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Page size. When provided, enables pagination and `count` returns total matching rows.
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of rows to skip (used with `limit`)
      responses:
        '200':
          description: List of bins
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Bin'
                  count:
                    type: integer
                    description: Total matching rows when paginated, or results.length otherwise
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /bins/trash:
    get:
      tags: [Bins]
      summary: List soft-deleted bins
      description: Returns bins with non-null deleted_at. Auto-purges after the location's configured trash_retention_days (default 30).
      parameters:
        - name: location_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of trashed bins
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Bin'
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /bins/lookup/{shortCode}:
    get:
      tags: [Bins]
      summary: Look up a bin by ID (alias)
      description: Legacy alias for GET /bins/{id}. Since bin IDs are now short codes, this endpoint is equivalent to fetching by ID.
      parameters:
        - name: shortCode
          in: path
          required: true
          schema:
            type: string
            minLength: 6
            maxLength: 6
      responses:
        '200':
          description: Bin found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /bins/pinned:
    get:
      tags: [Bins]
      summary: List pinned bins for current user
      parameters:
        - name: location_id
          in: query
