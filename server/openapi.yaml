                    type: string
                    format: uuid
      responses:
        '200':
          description: Pins reordered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bins/{id}:
    get:
      tags: [Bins]
      summary: Get a single bin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      responses:
        '200':
          description: Bin details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Bins]
      summary: Update a bin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBinRequest'
      responses:
        '200':
          description: Bin updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Bins]
      summary: Soft-delete a bin
      description: Sets deleted_at timestamp. Bin can be restored from trash.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      responses:
        '200':
          description: Bin soft-deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Bin deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /bins/{id}/pin:
    post:
      tags: [Bins]
      summary: Pin a bin (idempotent, max 20 per location)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      responses:
        '200':
          description: Bin pinned
          content:
            application/json:
              schema:
                type: object
                properties:
                  pinned:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Bins]
      summary: Unpin a bin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      responses:
        '200':
          description: Bin unpinned
          content:
            application/json:
              schema:
                type: object
                properties:
                  pinned:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bins/{id}/restore:
    post:
      tags: [Bins]
      summary: Restore a soft-deleted bin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      responses:
        '200':
          description: Bin restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /bins/{id}/move:
    post:
      tags: [Bins]
      summary: Move a bin to a different location
      description: |
        Moves a bin from its current location to a target location.
        The user must be a member of both locations.
        The area assignment is cleared since areas are location-scoped.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locationId]
              properties:
                locationId:
                  type: string
                  format: uuid
                  description: Target location ID
      responses:
        '200':
          description: Bin moved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bins/{id}/duplicate:
    post:
      tags: [Bins]
      summary: Duplicate a bin
      description: |
        Creates a copy of an existing bin including items, tags, notes, icon, color, area,
        card style, and visibility. Photos are not copied. The new bin gets a fresh auto-generated ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: "Custom name for the copy. Defaults to 'Copy of {original name}'."
      responses:
        '201':
          description: Bin duplicated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bins/{id}/change-code:
    post:
      summary: Change bin shortcode
      description: |
        Change a bin's shortcode (primary key). If the new code belongs to another bin,
        that bin is permanently deleted. Requires admin role.
      tags: [Bins]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the bin whose code will change (the survivor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: '^[A-Z0-9]{4,8}$'
                  description: New code to adopt
      responses:
        '200':
          description: Bin with updated code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
        '403':
          description: Not admin in one or both locations
        '404':
          description: Target bin not found
        '409':
          description: Conflict (concurrent modification)
        '422':
          description: Invalid code format or same as current code

  /bins/{id}/permanent:
    delete:
      tags: [Bins]
      summary: Permanently delete a bin
      description: Only works on soft-deleted bins. Removes the bin and its photos from storage.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      responses:
        '200':
          description: Bin permanently deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Bin permanently deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /bins/{id}/photos:
    post:
      tags: [Bins]
      summary: Upload a photo to a bin
      description: Accepts JPEG, PNG, or WebP up to 5MB.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '201':
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Photo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/QuotaExceeded'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bins/{id}/add-tags:
    put:
      tags: [Bins]
      summary: Add tags to a bin
      description: Merges new tags with existing ones (does not replace).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTagsRequest'
      responses:
        '200':
          description: Tags added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bins/{id}/items:
    post:
      tags: [Bins]
      summary: Add items to a bin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    oneOf:
                      - type: string
                      - type: object
                        properties:
                          name:
                            type: string
                          quantity:
                            type: integer
                        required: [name]
      responses:
        '201':
          description: Items added
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BinItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bins/{id}/items/{itemId}:
    put:
      tags: [Bins]
      summary: Rename an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                quantity:
                  type: integer
                  nullable: true
                  description: Optional quantity (null to clear)
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BinItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Bins]
      summary: Remove a single item from a bin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /bins/{id}/items/{itemId}/quantity:
    patch:
      tags: [Bins]
      summary: Update item quantity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
                  description: New quantity (0 or negative removes the item)
      responses:
        '200':
          description: Quantity updated or item removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  quantity:
                    type: integer
                  removed:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bins/{id}/items/reorder:
    put:
      tags: [Bins]
      summary: Reorder items in a bin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: 6-character alphanumeric bin short code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_ids]
              properties:
                item_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Items reordered
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ════════════════════════════════════════════════════════
  # Photos
  # ════════════════════════════════════════════════════════
  /photos:
    get:
      tags: [Photos]
      summary: List photos for a bin
      parameters:
        - name: bin_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of photos
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Photo'
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /photos/{id}/file:
    get:
      tags: [Photos]
      summary: Serve a photo file
      description: Returns the binary image file with appropriate content-type and caching headers.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: JWT token (alternative to Authorization header)
      responses:
        '200':
          description: Photo file
          content:
            image/*:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /photos/{id}/thumb:
    get:
      tags: [Photos]
      summary: Serve photo thumbnail
      description: |
        Returns a WebP thumbnail (600px wide, 70% quality). Generated lazily on first request
        and cached for subsequent requests. Falls back to original file if generation fails.
        Uses immutable 1-year cache headers.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Thumbnail image (WebP)
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /photos/{id}:
    delete:
      tags: [Photos]
      summary: Delete a photo
      description: Removes the photo record and deletes the file from storage.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Photo deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Photo deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════════════════════
  # Tag Colors
  # ════════════════════════════════════════════════════════
  /tag-colors:
    get:
      tags: [TagColors]
      summary: List tag colors for a location
      parameters:
        - name: location_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of tag colors
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/TagColor'
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      tags: [TagColors]
      summary: Upsert a tag color
      description: Creates or updates the color for a tag in a location.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagColorRequest'
      responses:
        '200':
          description: Tag color saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagColor'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /tag-colors/{tag}:
    delete:
      tags: [TagColors]
      summary: Delete a tag color
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
        - name: location_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tag color removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Tag color removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════════════════════
  # Tags
  # ════════════════════════════════════════════════════════
  /tags:
    get:
      tags: [Tags]
      summary: List tags with usage counts
      description: |
        Returns all tags used in a location with the number of (non-deleted, visible) bins
        each tag appears on. Supports search, sorting, and pagination.
      parameters:
        - name: location_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          schema:
            type: string
          description: Filter tags by name (case-insensitive substring match)
        - name: sort
          in: query
          schema:
            type: string
            enum: [alpha, count]
            default: alpha
          description: Sort by tag name or usage count
        - name: sort_dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 40
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of tags with counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        tag:
                          type: string
                        count:
                          type: integer
                          description: Number of bins using this tag
                  count:
                    type: integer
                    description: Total number of matching tags
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ════════════════════════════════════════════════════════
  # Items
  # ════════════════════════════════════════════════════════
  /items:
    get:
      tags: [Items]
      summary: Search items across all bins
      description: |
        Searches items across all non-deleted, visible bins in a location.
        Returns each item with its parent bin metadata.
      parameters:
        - name: location_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          schema:
            type: string
          description: Search text (word-match across item and bin names)
        - name: sort
          in: query
          schema:
            type: string
            enum: [alpha, bin]
            default: alpha
          description: Sort by item name or bin name
        - name: sort_dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 40
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of items with bin metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        bin_id:
                          type: string
                        bin_name:
                          type: string
                        bin_icon:
                          type: string
                        bin_color:
                          type: string
                  count:
                    type: integer
                    description: Total number of matching items
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ════════════════════════════════════════════════════════
  # Print Settings
  # ════════════════════════════════════════════════════════
  /print-settings:
    get:
      tags: [PrintSettings]
      summary: Get print label settings
      description: Returns the current user's saved label format and custom dimensions.
      responses:
        '200':
          description: Print settings (or empty object if none saved)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrintSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [PrintSettings]
      summary: Save print label settings
      description: Stores label format and custom dimension overrides per user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [settings]
              properties:
                settings:
                  type: object
                  description: Arbitrary JSON with label format, custom dimensions, etc.
      responses:
        '200':
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrintSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ════════════════════════════════════════════════════════
  # User Preferences
  # ════════════════════════════════════════════════════════
  /user-preferences:
    get:
      tags: [UserPreferences]
      summary: Get user preferences
      description: Returns the current user's application preferences as a JSON object, or null if none saved.
      responses:
        '200':
          description: User preferences (or null if none saved)
          content:
            application/json:
              schema:
                nullable: true
                type: object
                description: Arbitrary JSON preferences object
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [UserPreferences]
      summary: Save user preferences
      description: Stores application preferences per user. Creates or updates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary JSON object with user preference key-value pairs
      responses:
        '200':
          description: Preferences saved
          content:
            application/json:
              schema:
                type: object
                description: The saved preferences object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ════════════════════════════════════════════════════════
  # Saved Views
  # ════════════════════════════════════════════════════════
  /saved-views:
    get:
      tags: [SavedViews]
      summary: List saved views
      description: Returns all saved bin list views for the current user (max 10).
      responses:
        '200':
          description: List of saved views
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SavedView'
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [SavedViews]
      summary: Create a saved view
      description: Creates a new saved view. Maximum 10 per user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                searchQuery:
                  type: string
                sort:
                  type: string
                filters:
                  type: object
      responses:
        '201':
          description: Saved view created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /saved-views/{id}:
    put:
      tags: [SavedViews]
      summary: Rename a saved view
      description: Updates the name of a saved view. Must be owned by the current user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Saved view updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [SavedViews]
      summary: Delete a saved view
      description: Deletes a saved view. Must be owned by the current user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Saved view deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════════════════════
  # Scan History
  # ════════════════════════════════════════════════════════
  /scan-history:
    get:
      tags: [ScanHistory]
      summary: Get scan history
      description: Returns the current user's recent QR scan history, ordered by most recent first.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of entries to return
      responses:
        '200':
          description: List of scan history entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScanHistoryEntry'
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [ScanHistory]
      summary: Record a scan
      description: Records or updates a bin scan. If the bin was previously scanned, updates the timestamp. Automatically trims history to 100 entries.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [binId]
              properties:
                binId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Scan recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ScanHistory]
      summary: Clear scan history
      description: Deletes all scan history entries for the current user.
      responses:
        '204':
          description: Scan history cleared
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ════════════════════════════════════════════════════════
  # Export / Import
  # ════════════════════════════════════════════════════════
  /locations/{id}/export:
    get:
      tags: [Export]
      summary: Export location as JSON
      description: Returns V2 format JSON with base64-encoded photos embedded in each bin. Requires Pro plan.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: JSON export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportDataV2'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          oneOf:
            - $ref: '#/components/responses/Forbidden'
            - $ref: '#/components/responses/PlanRestricted'

  /locations/{id}/export/zip:
    get:
      tags: [Export]
      summary: Export location as ZIP
      description: Returns a ZIP file containing a JSON manifest and a photos directory. Requires Pro plan.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: ZIP file download
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          oneOf:
            - $ref: '#/components/responses/Forbidden'
            - $ref: '#/components/responses/PlanRestricted'

  /locations/{id}/export/csv:
    get:
      tags: [Export]
      summary: Export location as CSV
      description: |
        Returns a CSV spreadsheet with one row per item. Columns: Bin Name, Area, Item,
        Quantity, Tags (comma-separated). Bins with no items get a single row with empty
        Item and Quantity fields.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /locations/{id}/import:
    post:
      tags: [Export]
      summary: Import bins and photos
      description: |
        Imports V1 or V2 format data. Supports merge (add to existing) or replace (clear first) modes.
        50MB body limit. Creates areas from location strings on import.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportRequest'
      responses:
        '200':
          description: Import summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: integer
                    description: Number of bins imported
                  photos:
                    type: integer
                    description: Number of photos imported
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /locations/{id}/import/csv:
    post:
      tags: [Export]
      summary: Import bins from CSV
      description: |
        Imports bins from a CSV file. Supports two formats:
        - Round-trip format (matches CSV export): Bin Name, Area, Item, Quantity, Tags
        - One-bin-per-row format: Bin Name, Area, Items, Tags
        Max 10MB file size. Max 2000 bins.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file (.csv)
                mode:
                  type: string
                  enum: [merge, replace]
                  default: merge
      responses:
        '200':
          description: Import summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  binsImported:
                    type: integer
                  binsSkipped:
                    type: integer
                  itemsImported:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /locations/{id}/import/zip:
    post:
      tags: [Export]
      summary: Import from ZIP backup
      description: |
        Imports bins, photos, tag colors, and custom field definitions from a ZIP backup
        produced by the ZIP export endpoint. The ZIP must contain `manifest.json` (with
        `format: "openbin-zip"`) and `bins.json`. Photos are read from `photos/` directory.
        Max 200MB file size. Max 2000 bins.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: ZIP file (.zip)
                mode:
                  type: string
                  enum: [merge, replace]
                  default: merge
      responses:
        '200':
          description: Import summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  binsImported:
                    type: integer
                  binsSkipped:
                    type: integer
                  photosImported:
                    type: integer
                  photosSkipped:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /import/legacy:
    post:
      tags: [Export]
      summary: Import legacy V1 format
      description: |
        Imports data from the old V1 export format (freeform contents string).
        Handles homeName field mapping. 50MB body limit.
      requestBody:
        required: true
        content:
          application/json:
