  # AI Streaming
  # ════════════════════════════════════════════════════════
  /ai/query/stream:
    post:
      tags: [AI]
      summary: Stream inventory query via SSE
      description: |
        Read-only AI endpoint that streams a natural language answer about inventory
        as Server-Sent Events. Returns structured JSON with matches and answer.
        Requires location membership and Pro plan. Rate limited: 30/hr for JWT, 1000/hr for API keys.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question, locationId]
              properties:
                question:
                  type: string
                  maxLength: 5000
                  description: Natural language question about inventory
                locationId:
                  type: string
                  format: uuid
                  description: Location to search within
      responses:
        '200':
          description: SSE stream of JSON chunks (Content-Type text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                description: "SSE events: delta (partial JSON), done (complete JSON). Final JSON matches QueryResult schema."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          oneOf:
            - $ref: '#/components/responses/Forbidden'
            - $ref: '#/components/responses/PlanRestricted'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /ai/command/stream:
    post:
      tags: [AI]
      summary: Stream parsed command actions via SSE
      description: |
        Streams structured inventory actions parsed from a natural language command.
        The client previews and executes the returned actions using existing mutation endpoints.
        Requires location membership and Pro plan. Rate limited.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, locationId]
              properties:
                text:
                  type: string
                  maxLength: 5000
                  description: Natural language command
                locationId:
                  type: string
                  format: uuid
                  description: Location ID to scope the command context
      responses:
        '200':
          description: SSE stream of JSON chunks (Content-Type text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                description: "SSE events: delta (partial JSON), done (complete JSON with actions and interpretation)."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          oneOf:
            - $ref: '#/components/responses/Forbidden'
            - $ref: '#/components/responses/PlanRestricted'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

