        content:
          application/json:
            schema:
              type: object
              required: [text, locationId]
              properties:
                text:
                  type: string
                  maxLength: 5000
                  description: Natural language command or question
                locationId:
                  type: string
                  format: uuid
                  description: Location ID to scope the request
      responses:
        '200':
          description: SSE stream of JSON chunks
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
