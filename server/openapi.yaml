openapi: 3.0.3
info:
  title: OpenBin API
  version: 1.0.0
  description: |
    REST API for OpenBin — a multi-user web app for organizing physical storage bins with QR codes.

    **Authentication**: Most endpoints require authentication via one of:
    - **httpOnly cookies** (primary) — `openbin-access` (15 min) + `openbin-refresh` (7 days), set automatically on login/register. Browsers send these with every request.
    - **API key** created via `POST /api-keys` (long-lived, format: `sk_openbin_...`) — `Authorization: Bearer <key>`

    **Response envelopes**: All list endpoints return `{ results: T[], count: number }`.
    Error responses use `{ error: "CODE", message: "Human readable" }`.

servers:
  - url: /api
    description: API base path (proxied via nginx)

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Registration, login, profile, avatar, account management
  - name: Locations
    description: Location CRUD, membership, and invite codes
  - name: Areas
    description: Named zones within a location
  - name: CustomFields
    description: Per-location custom field definitions for bins
  - name: Bins
    description: Bin CRUD, soft deletes, QR lookup, photo upload, tag management
  - name: Photos
    description: Photo retrieval and deletion
  - name: TagColors
    description: Per-location tag color assignments
  - name: PrintSettings
    description: Per-user print label settings
  - name: Export
    description: Export and import location data
  - name: AI
    description: AI provider settings and image analysis
  - name: Activity
    description: Location activity log
  - name: ApiKeys
    description: API key management for headless access
  - name: UserPreferences
    description: Per-user application preferences
  - name: SavedViews
    description: Per-user saved bin list filter/sort views
  - name: ScanHistory
    description: Per-user QR scan history
  - name: Tags
    description: Tag listing and search across a location
  - name: Items
    description: Item search across all bins in a location
  - name: Batch
    description: Execute multiple bin operations in a single transaction
  - name: Health
    description: Health check for monitoring and orchestration
  - name: Plan
    description: Current user plan information and feature entitlements
  - name: Subscriptions
    description: Subscription lifecycle callbacks from the billing service


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: API key (sk_openbin_...) via Authorization header. Cookies are the primary auth method for browsers.

  schemas:
    # ── Error ──────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          enum:
            - VALIDATION_ERROR
            - UNAUTHORIZED
            - NOT_FOUND
            - FORBIDDEN
            - CONFLICT
            - RATE_LIMITED
            - INTERNAL_ERROR
        message:
          type: string
      example:
        error: NOT_FOUND
        message: Bin not found

    # ── Auth ───────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        plan:
          type: string
          enum: [lite, pro]
          description: Current plan tier
        subscriptionStatus:
          type: string
          enum: [inactive, active, trial]
          description: Current subscription status
        activeUntil:
          type: string
          format: date-time
          nullable: true
          description: Date until which the current plan is active (null for self-hosted)

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        activeLocationId:
          type: string
          format: uuid
          nullable: true

    RegisterRequest:
      type: object
      required: [username, password, displayName]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 8
          description: Must contain uppercase, lowercase, and digit
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          description: Must contain uppercase, lowercase, and digit

    DeleteAccountRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string

    # ── Location ───────────────────────────────────────────
    Location:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_by:
          type: string
          format: uuid
          nullable: true
        invite_code:
          type: string
        activity_retention_days:
          type: integer
          minimum: 7
          maximum: 365
          default: 90
          description: Days to keep activity log entries before auto-pruning
        trash_retention_days:
          type: integer
          minimum: 7
          maximum: 365
          default: 30
          description: Days to keep soft-deleted bins before auto-purging
        app_name:
          type: string
          default: OpenBin
          description: Custom display name for this location's app instance
        term_bin:
          type: string
          default: bin
          description: Custom terminology for 'bin'
        term_location:
          type: string
          default: location
          description: Custom terminology for 'location'
        term_area:
          type: string
          default: area
          description: Custom terminology for 'area'
        default_join_role:
          type: string
          enum: [member, viewer]
          default: member
          description: Default role assigned to new members joining via invite code
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LocationWithMeta:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_by:
          type: string
          format: uuid
          nullable: true
        invite_code:
          type: string
        activity_retention_days:
          type: integer
          minimum: 7
          maximum: 365
          default: 90
        trash_retention_days:
          type: integer
          minimum: 7
          maximum: 365
          default: 30
        app_name:
          type: string
          default: OpenBin
        term_bin:
          type: string
          default: bin
        term_location:
          type: string
          default: location
        term_area:
          type: string
          default: area
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        member_count:
          type: integer
        area_count:
          type: integer
        bin_count:
          type: integer
          description: Number of non-deleted bins in this location
        role:
          type: string
          enum: [admin, member, viewer]
        default_join_role:
          type: string
          enum: [member, viewer]
          default: member
          description: Default role assigned to new members joining via invite code

    LocationMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, member, viewer]
        joined_at:
          type: string
          format: date-time
        display_name:
          type: string
        username:
          type: string

    CreateLocationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255

    JoinLocationRequest:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    # ── Area ───────────────────────────────────────────────
    Area:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        name:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Parent area ID for hierarchical nesting (null = root area)
        bin_count:
          type: integer
          description: Number of non-deleted bins directly in this area (only present in list response)
        descendant_bin_count:
          type: integer
          description: Number of non-deleted bins in this area and all its descendants (only present in list response)
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAreaRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Optional parent area ID for nesting under an existing area

    # ── Custom Field ──────────────────────────────────────
    CustomField:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        name:
          type: string
        position:
          type: integer
          description: Display order (0-based)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Bin ────────────────────────────────────────────────
    Bin:
      type: object
      properties:
        id:
          type: string
          description: 6-character alphanumeric short code (e.g. TBXABC)
          minLength: 4
          maxLength: 8
        location_id:
          type: string
          format: uuid
        name:
          type: string
        area_id:
          type: string
          format: uuid
          nullable: true
        area_name:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/BinItem'
        notes:
          type: string
        tags:
          type: array
          items:
            type: string
        icon:
          type: string
          description: PascalCase lucide icon name, empty string for default
        color:
          type: string
          description: Color preset key, empty string for no color
        card_style:
          type: string
          maxLength: 500
          description: JSON-encoded card style configuration, empty string for default
        visibility:
          $ref: '#/components/schemas/BinVisibility'
        custom_fields:
          type: object
          additionalProperties:
            type: string
          description: "Custom field values as { fieldId: value } map"
        created_by:
          type: string
          format: uuid
          nullable: true
        created_by_name:
          type: string
          description: Display name of the user who created this bin
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        is_pinned:
          type: boolean
          description: Whether the current user has pinned this bin

    BinItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        quantity:
          type: integer
          nullable: true
          description: Optional quantity (null = not tracked)

    BinVisibility:
      type: string
      enum: [location, private]
      default: location
      description: >
        Visibility level for a bin.
        `location` — visible to all location members (default).
        `private` — visible only to the creator.

    CreateBinRequest:
      type: object
      required: [name, locationId]
      properties:
        name:
          type: string
          maxLength: 255
        locationId:
          type: string
          format: uuid
        items:
          type: array
          items:
            type: string
          maxItems: 500
        notes:
          type: string
          maxLength: 10000
        tags:
          type: array
          items:
            type: string
          maxItems: 50
        areaId:
          type: string
          format: uuid
        icon:
          type: string
        color:
          type: string
        cardStyle:
          type: string
          maxLength: 500
          description: JSON-encoded card style configuration
        visibility:
          $ref: '#/components/schemas/BinVisibility'
        customFields:
          type: object
          additionalProperties:
            type: string
          description: "Custom field values as { fieldId: value } map"

    UpdateBinRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        areaId:
          type: string
          format: uuid
          nullable: true
        items:
          type: array
          items:
            type: string
          maxItems: 500
        notes:
          type: string
          maxLength: 10000
        tags:
          type: array
          items:
            type: string
          maxItems: 50
        icon:
          type: string
        color:
          type: string
        cardStyle:
          type: string
          maxLength: 500
          description: JSON-encoded card style configuration
        visibility:
          $ref: '#/components/schemas/BinVisibility'
        customFields:
          type: object
          additionalProperties:
            type: string
          description: "Custom field values as { fieldId: value } map"

    AddTagsRequest:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            type: string
          maxItems: 50

    # ── Photo ──────────────────────────────────────────────
    Photo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bin_id:
          type: string
          format: uuid
        filename:
          type: string
        mime_type:
          type: string
        size:
          type: integer
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Tag Color ──────────────────────────────────────────
    TagColor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        tag:
          type: string
        color:
          type: string
          description: Color preset key from colorPalette
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TagColorRequest:
      type: object
      required: [locationId, tag, color]
      properties:
        locationId:
          type: string
          format: uuid
        tag:
          type: string
        color:
          type: string

    # ── Activity ───────────────────────────────────────────
    ActivityLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        user_name:
          type: string
        display_name:
          type: string
        action:
          type: string
          description: "e.g. bin_created, bin_updated, photo_added"
        entity_type:
          type: string
          description: "e.g. bin, photo, area, member"
        entity_id:
          type: string
          format: uuid
          nullable: true
        entity_name:
          type: string
          nullable: true
        changes:
          type: object
          nullable: true
          additionalProperties:
            type: object
            properties:
              old: {}
              new: {}
        auth_method:
          type: string
          enum: [jwt, api_key]
          nullable: true
        api_key_name:
          type: string
          nullable: true
          description: Name of the API key used (only present when auth_method is api_key)
        created_at:
          type: string
          format: date-time

    # ── AI ─────────────────────────────────────────────────
    AiSettings:
      type: object
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [openai, anthropic, gemini, openai-compatible]
        apiKey:
          type: string
          description: Masked when returned from GET
        model:
          type: string
        endpointUrl:
          type: string
          nullable: true
        customPrompt:
          type: string
          nullable: true
          maxLength: 10000
          description: "Custom system prompt for AI image analysis. Use {available_tags} placeholder to inject existing tags. Null uses the default prompt."
        commandPrompt:
          type: string
          nullable: true
          maxLength: 10000
          description: "Custom system prompt for AI natural language commands. Null uses the default prompt."
        queryPrompt:
          type: string
          nullable: true
          maxLength: 10000
          description: "Custom system prompt for AI inventory queries. Null uses the default prompt."
        structurePrompt:
          type: string
          nullable: true
          maxLength: 10000
          description: "Custom system prompt for AI item extraction from text/voice. Null uses the default prompt."
        reorganizationPrompt:
          type: string
          nullable: true
          maxLength: 10000
          description: "Custom system prompt for AI bin reorganization suggestions. Null uses the default prompt."
        temperature:
          type: number
          nullable: true
          minimum: 0
          maximum: 2
          description: Sampling temperature for AI requests
        maxTokens:
          type: integer
          nullable: true
          minimum: 1
          maximum: 32768
          description: Maximum tokens in AI response
        topP:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
          description: Top-p (nucleus) sampling parameter
        requestTimeout:
          type: integer
          nullable: true
          minimum: 5
          maximum: 300
          description: Request timeout in seconds
        taskModelOverrides:
          type: object
          nullable: true
          description: "Per-task model overrides. Keys are task types, values are model names. Null or absent means all tasks use the default model."
          properties:
            analysis:
              type: string
            command:
              type: string
            query:
              type: string
            structure:
              type: string
            reorganization:
              type: string
        providerConfigs:
          type: object
          description: "Per-provider saved credentials (apiKey is masked). Keys are provider names."
          additionalProperties:
            type: object
            properties:
              apiKey:
                type: string
              model:
                type: string
              endpointUrl:
                type: string
                nullable: true
        source:
          type: string
          enum: [user, env]
          description: "'user' when loaded from DB, 'env' when using server-wide env var config"

    AiSettingsRequest:
      type: object
      required: [provider, apiKey, model]
      properties:
        provider:
          type: string
          enum: [openai, anthropic, gemini, openai-compatible]
        apiKey:
          type: string
        model:
          type: string
        endpointUrl:
          type: string
          description: Required when provider is openai-compatible
        customPrompt:
          type: string
          nullable: true
          maxLength: 10000
          description: "Custom system prompt for AI image analysis. Use {available_tags} placeholder to inject existing tags. Null uses the default prompt."
        commandPrompt:
          type: string
          nullable: true
          maxLength: 10000
          description: "Custom system prompt for AI natural language commands. Null uses the default prompt."
        queryPrompt:
          type: string
          nullable: true
          maxLength: 10000
          description: "Custom system prompt for AI inventory queries. Null uses the default prompt."
        structurePrompt:
          type: string
          nullable: true
          maxLength: 10000
          description: "Custom system prompt for AI item extraction from text/voice. Null uses the default prompt."
        reorganizationPrompt:
          type: string
          nullable: true
          maxLength: 10000
          description: "Custom system prompt for AI bin reorganization suggestions. Null uses the default prompt."
        taskModelOverrides:
          type: object
          nullable: true
          description: "Per-task model overrides. Keys are task types, values are model names. Null clears all overrides."
          properties:
            analysis:
              type: string
            command:
              type: string
            query:
              type: string
            structure:
              type: string
            reorganization:
              type: string
        providerConfigs:
          type: object
          description: "Per-provider saved credentials. Keys are provider names."
          additionalProperties:
            type: object
            properties:
              apiKey:
                type: string
              model:
                type: string
              endpointUrl:
                type: string
                nullable: true
        temperature:
          type: number
          nullable: true
          minimum: 0
          maximum: 2
        maxTokens:
          type: integer
          nullable: true
          minimum: 1
          maximum: 32768
        topP:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
        requestTimeout:
          type: integer
          nullable: true
          minimum: 5
          maximum: 300
          description: Request timeout in seconds

    AiSuggestedItem:
      type: object
      required: [name]
      properties:
        name:
          type: string
        quantity:
          type: integer
          nullable: true
          description: Suggested quantity (null if not applicable)

    AiSuggestions:
      type: object
      properties:
        name:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/AiSuggestedItem'
        tags:
          type: array
          items:
            type: string
        notes:
          type: string
        customFields:
          type: object
          additionalProperties:
            type: string
          description: Suggested custom field values (field name -> value)

    AiAnalyzeRequest:
      type: object
      properties:
        photoId:
          type: string
          format: uuid
          description: Single photo to analyze
        photoIds:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 5
          description: Multiple photos to analyze (max 5)

    AiTestRequest:
      type: object
      required: [provider, apiKey, model]
      properties:
        provider:
          type: string
          enum: [openai, anthropic, gemini, openai-compatible]
        apiKey:
          type: string
        model:
          type: string
        endpointUrl:
          type: string

    # ── API Keys ──────────────────────────────────────────
    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key_prefix:
          type: string
          description: First 18 characters of the key for identification
        name:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true

    ApiKeyCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: "Full API key — shown only once at creation time"
        keyPrefix:
          type: string
        name:
          type: string

    # ── Query & Execute ───────────────────────────────────
    QueryResult:
      type: object
      properties:
        answer:
          type: string
          description: Natural language answer to the question
        matches:
          type: array
          items:
            type: object
            properties:
              bin_id:
                type: string
                format: uuid
              name:
                type: string
              area_name:
                type: string
              items:
                type: array
                items:
                  type: string
              tags:
                type: array
                items:
                  type: string
              relevance:
                type: string

    # ── Print Settings ─────────────────────────────────────
    PrintSettings:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        settings:
          type: object
          description: Arbitrary JSON object with label format and custom dimensions
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── User Preferences ──────────────────────────────────
    UserPreferences:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        settings:
          type: object
          description: Arbitrary JSON object with user preference key-value pairs
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Saved Views ──────────────────────────────────────
    SavedView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        search_query:
          type: string
        sort:
          type: string
        filters:
          type: object
          description: JSON object with filter criteria
        created_at:
          type: string
          format: date-time

    # ── Scan History ─────────────────────────────────────
    ScanHistoryEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bin_id:
          type: string
          format: uuid
        scanned_at:
          type: string
          format: date-time

    # ── Export ─────────────────────────────────────────────
    ExportDataV2:
      type: object
      properties:
        version:
          type: integer
          enum: [2]
        exportedAt:
          type: string
          format: date-time
        locationName:
          type: string
        bins:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: 6-character alphanumeric short code
              name:
                type: string
              location:
                type: string
                description: Area name for backward compatibility
              items:
                type: array
                items:
                  type: string
              notes:
                type: string
              tags:
                type: array
                items:
                  type: string
              icon:
                type: string
              color:
                type: string
              cardStyle:
                type: string
                description: JSON-encoded card style configuration
              shortCode:
                type: string
                description: Same as id (kept for export format compatibility)
              customFields:
                type: object
                additionalProperties:
                  type: string
                description: "Custom field values as { fieldName: value } map"
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
              photos:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    filename:
                      type: string
                    mimeType:
                      type: string
                    data:
                      type: string
                      format: byte

    ImportRequest:
      type: object
      required: [version, bins]
      properties:
        version:
          type: integer
          enum: [1, 2]
        exportedAt:
          type: string
          format: date-time
        locationName:
          type: string
        bins:
          type: array
          items:
            type: object
        photos:
          type: array
          items:
            type: object
        mode:
          type: string
          enum: [merge, replace]
          description: Import mode — merge adds to existing, replace clears first

    # ── Plan ───────────────────────────────────────────────
    PlanFeatures:
      type: object
      properties:
        ai:
          type: boolean
          description: Access to AI features
        apiKeys:
          type: boolean
          description: Ability to create API keys
        customFields:
          type: boolean
          description: Ability to create custom field definitions
        fullExport:
          type: boolean
          description: Access to JSON and ZIP export formats
        maxLocations:
          type: integer
          nullable: true
          description: Maximum number of locations (null = unlimited)
        maxBinsPerLocation:
          type: integer
          nullable: true
          description: Maximum bins per location (null = unlimited)
        maxPhotoStorageMb:
          type: integer
          nullable: true
          description: Maximum photo storage in MB (null = unlimited)
        maxMembersPerLocation:
          type: integer
          nullable: true
          description: Maximum members per location (null = unlimited)

    PlanInfo:
      type: object
      properties:
        plan:
          type: string
          enum: [lite, pro]
          description: Current plan tier
        status:
          type: string
          enum: [inactive, active, trial]
          description: Current subscription status
        activeUntil:
          type: string
          format: date-time
          nullable: true
          description: Date until which the current plan is active (null for self-hosted or no expiry)
        selfHosted:
          type: boolean
          description: Whether the server is running in self-hosted mode (all features unlocked)
        features:
          $ref: '#/components/schemas/PlanFeatures'
        upgradeUrl:
          type: string
          nullable: true
          description: URL to upgrade the plan (null when not applicable)

    PlanRestrictedError:
      type: object
      properties:
        error:
          type: string
          example: PLAN_RESTRICTED
        message:
          type: string
        upgrade_url:
          type: string
          nullable: true
          description: URL to upgrade the plan (null when not applicable)

    SubscriptionCallbackRequest:
      type: object
      required: [userId, plan, status, activeUntil]
      properties:
        userId:
          type: string
          description: ID of the user whose subscription is being updated
        plan:
          type: integer
          enum: [0, 1]
          description: "Plan tier: 0=lite, 1=pro"
        status:
          type: integer
          enum: [0, 1, 2]
          description: "Subscription status: 0=inactive, 1=active, 2=trial"
        activeUntil:
          type: string
          format: date-time
          nullable: true
          description: Date until which the plan is active (null for inactive)

  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: UNAUTHORIZED
            message: Not authenticated
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: FORBIDDEN
            message: Not a member of this location
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: NOT_FOUND
            message: Resource not found
    ValidationError:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: VALIDATION_ERROR
            message: Name is required
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: RATE_LIMITED
            message: Too many attempts, please try again later
    QuotaExceeded:
      description: Upload quota exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            binLimit:
              summary: Per-bin photo limit
              value:
                error: BIN_PHOTO_LIMIT
                message: Maximum 1 photos per bin
            userQuota:
              summary: Per-user demo quota
              value:
                error: USER_QUOTA_EXCEEDED
                message: "Upload quota exceeded: 4.8 MB used of 5 MB allowed"
            globalQuota:
              summary: Global demo storage cap
              value:
                error: GLOBAL_QUOTA_EXCEEDED
                message: "Demo storage limit reached (50 MB). Please contact the administrator."
    PlanRestricted:
      description: Feature requires Pro plan
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PlanRestrictedError'
          example:
            error: PLAN_RESTRICTED
            message: This feature requires a Pro plan
            upgrade_url: https://example.com/upgrade

paths:
  # ════════════════════════════════════════════════════════
  # Health
  # ════════════════════════════════════════════════════════
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns application health status including database connectivity. No authentication or rate limiting.
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '503':
          description: Unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Database unreachable

  # ════════════════════════════════════════════════════════
  # Plan
  # ════════════════════════════════════════════════════════
  /plan:
    get:
      tags: [Plan]
      summary: Get current user's plan info
      description: |
        Returns the current user's plan tier, subscription status, feature entitlements,
        and whether the server is running in self-hosted mode. In self-hosted mode all
        features are always available regardless of plan.
      responses:
        '200':
          description: Plan info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ════════════════════════════════════════════════════════
  # Subscriptions
  # ════════════════════════════════════════════════════════
  /subscriptions/callback:
    post:
      tags: [Subscriptions]
      summary: Subscription lifecycle callback
      description: |
        Called by the billing service to update a user's plan and subscription status.
        Authentication requires a Bearer JWT signed with `SUBSCRIPTION_JWT_SECRET`.
        This endpoint is not intended for direct client use.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCallbackRequest'
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '401':
          description: Invalid or missing subscription JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Invalid or missing subscription token
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: NOT_FOUND
                message: User not found
        '422':
          $ref: '#/components/responses/ValidationError'

  # ════════════════════════════════════════════════════════
  # Auth
  # ════════════════════════════════════════════════════════
  /auth/status:
    get:
      tags: [Auth]
      summary: Get public auth status
      description: Returns server configuration flags relevant to the auth UI (e.g. whether registration is enabled). No authentication required.
      security: []
      responses:
        '200':
          description: Auth status
          content:
            application/json:
              schema:
                type: object
                properties:
                  registrationEnabled:
                    type: boolean
                    description: Whether new user registration is allowed
                  registrationMode:
                    type: string
                    enum: [open, invite, closed]
                    description: Registration policy
                  demoMode:
                    type: boolean
                    description: Whether demo mode is enabled (shows demo login button)
                  qrPayloadMode:
                    type: string
                    enum: [app, url]
                    description: "QR code encoding mode: app (openbin:// URI) or url (web URL using baseUrl)"
                  baseUrl:
                    type: string
                    description: Base URL for QR codes (present only when qrPayloadMode is url)
                  selfHosted:
                    type: boolean
                    description: Whether the server is running in self-hosted mode (all plan features unlocked)

  /auth/demo-login:
    post:
      tags: [Auth]
      summary: Log in as demo user
      description: |
        Authenticates as the pre-seeded demo user. Only available when DEMO_MODE is enabled.
        Rate limited to 5 per 15 minutes.
      security: []
      responses:
        '200':
          description: Demo login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '403':
          description: Demo mode is not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: FORBIDDEN
                message: Demo mode is not enabled
        '404':
          description: Demo user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: NOT_FOUND
                message: Demo user not found
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: "Creates a new user account. Rate limited to 3 per hour. Returns 403 if registration is disabled via REGISTRATION_MODE env var (modes: open, invite, closed)."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '403':
          description: Registration disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: FORBIDDEN
                message: Registration is currently disabled
        '409':
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: CONFLICT
                message: Username already taken
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with username and password
      description: Returns JWT token and user info. Rate limited to 5 per 15 minutes.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Invalid username or password
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token
      description: |
        Reads the `openbin-refresh` httpOnly cookie, validates and revokes the old refresh token,
        and issues a new access + refresh token pair as httpOnly cookies. No authentication header required
        (the access token may be expired). Rate limited.
        If the presented refresh token was already revoked (replay attack), the entire token family is revoked.
      security: []
      responses:
        '200':
          description: Tokens refreshed — new cookies set
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token refreshed
        '401':
          description: Invalid, expired, or missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out (revoke current refresh token)
      description: Revokes the refresh token from the `openbin-refresh` cookie and clears auth cookies. No authentication required.
      security: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Log out all sessions
      description: Revokes all refresh tokens for the authenticated user, effectively logging out every device.
      responses:
        '200':
          description: All sessions logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: All sessions logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    properties:
                      activeLocationId:
                        type: string
                        format: uuid
                        nullable: true
                        description: Persisted active location selection (null if not set or membership lost)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/active-location:
    put:
      tags: [Auth]
      summary: Persist active location selection
      description: Sets the user's active location. The location is validated for membership.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locationId]
              properties:
                locationId:
                  type: string
                  format: uuid
                  nullable: true
                  description: Location ID to set as active, or null to clear
      responses:
        '200':
          description: Active location updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeLocationId:
                    type: string
                    format: uuid
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not a member of the specified location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/profile:
    put:
      tags: [Auth]
      summary: Update display name and/or email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/password:
    put:
      tags: [Auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password updated
        '401':
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/avatar:
    post:
      tags: [Auth]
      summary: Upload avatar image
      description: Accepts JPEG, PNG, or WebP up to 2MB.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatarUrl:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Auth]
      summary: Remove avatar
      responses:
        '200':
          description: Avatar removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Avatar removed
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/avatar/{userId}:
    get:
      tags: [Auth]
      summary: Serve avatar file
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Avatar image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/account:
    delete:
      tags: [Auth]
      summary: Permanently delete account
      description: |
        Deletes the user, their avatar, and any locations where they are the sole member
        (cascading bins, photos, tag colors). Shared locations are preserved.
        Requires password confirmation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Account deleted
        '401':
          description: Password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with a one-time token
      description: Consumes a password reset token (generated by an admin) and sets a new password. No authentication required.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                  description: One-time reset token provided by admin
                newPassword:
                  type: string
                  description: "New password (8+ chars, uppercase, lowercase, digit)"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Invalid, expired, or already-used token
        "422":
          description: Password does not meet strength requirements

  # ════════════════════════════════════════════════════════
  # Locations
  # ════════════════════════════════════════════════════════
  /locations:
    get:
      tags: [Locations]
      summary: List user's locations
      description: Returns locations the current user is a member of, with member count and role.
      responses:
        '200':
          description: List of locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/LocationWithMeta'
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Locations]
      summary: Create a new location
      description: Creates a location and adds the current user as owner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationRequest'
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /locations/join:
    post:
      tags: [Locations]
      summary: Join a location via invite code
      description: Rate limited to 10 per 15 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinLocationRequest'
      responses:
        '200':
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: NOT_FOUND
                message: Invalid invite code
        '409':
          description: Already a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: CONFLICT
                message: Already a member of this location
        '429':
          $ref: '#/components/responses/RateLimited'

  /locations/{id}:
    put:
      tags: [Locations]
      summary: Update a location
      description: Admin only. Can update name, retention settings, app name, and custom terminology.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                activity_retention_days:
                  type: integer
                  minimum: 7
                  maximum: 365
                  description: Days to keep activity log entries
                trash_retention_days:
                  type: integer
                  minimum: 7
                  maximum: 365
                  description: Days to keep soft-deleted bins
                app_name:
                  type: string
                  description: Custom display name for this location's app instance
                term_bin:
                  type: string
                  maxLength: 50
                  description: "Custom term for 'bin' (e.g. 'box', 'container')"
                term_location:
                  type: string
                  maxLength: 50
                  description: "Custom term for 'location'"
                term_area:
                  type: string
                  maxLength: 50
                  description: "Custom term for 'area'"
                default_join_role:
                  type: string
                  enum: [member, viewer]
                  description: Default role assigned to new members joining via invite code
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Locations]
      summary: Delete a location
      description: Admin only. Cascades to bins, photos, areas, tag colors, and activity log.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Location deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Location deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /locations/{id}/members:
    get:
      tags: [Locations]
      summary: List location members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/LocationMember'
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /locations/{id}/members/{userId}:
    delete:
      tags: [Locations]
      summary: Remove a member from location
      description: Admins can remove anyone. Members can only remove themselves (leave). Last admin cannot leave.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
