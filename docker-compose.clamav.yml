services:
  openbin:
    environment:
      CLAMAV_HOST: clamav
    depends_on:
      clamav:
        condition: service_healthy

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clamdscan", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - clamav_data:/var/lib/clamav

volumes:
  clamav_data:
