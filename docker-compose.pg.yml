# Docker Compose override for PostgreSQL deployment.
# Usage: docker compose -f docker-compose.yml -f docker-compose.pg.yml up -d
services:
  openbin:
    environment:
      DATABASE_URL: postgres://openbin:openbin@postgres:5432/openbin
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: openbin
      POSTGRES_PASSWORD: openbin
      POSTGRES_DB: openbin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbin"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
