<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&display=swap" /></noscript>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-192x192.png" />
    <title>OpenBin</title>
    <!-- Critical design tokens inlined so they resolve before the external stylesheet loads.
         Values duplicated from src/index.css — keep in sync. -->
    <style>
      :root{--bg-base:#f5f5f5;--bg-flat:#fff;--border-flat:#e0e0e0;--text-primary:#1c1c1e;--text-secondary:#3c3c43;--text-tertiary:#6d6d72;color-scheme:light}
      .dark{--bg-base:#121212;--bg-flat:#1e1e1e;--border-flat:#333;--text-primary:#f5f5f7;--text-secondary:#ebebf0;--text-tertiary:#98989d;color-scheme:dark}
      body{background:var(--bg-base);color:var(--text-primary)}
    </style>
    <script>
      // Apply stored theme before first paint to prevent flash
      (function() {
        var t = localStorage.getItem('openbin-theme');
        if (t !== 'light' && t !== 'dark') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.className = t;
        document.documentElement.style.colorScheme = t;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Recovery for iOS PWA blank screen after service worker cache eviction.
      // If React hasn't rendered anything after 5s, clear SW caches and reload once.
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && !root.children.length) {
          if (sessionStorage.getItem('openbin-sw-recovery')) return;
          sessionStorage.setItem('openbin-sw-recovery', '1');
          if ('caches' in window) {
            caches.keys().then(function(names) {
              return Promise.all(names.map(function(n) { return caches.delete(n); }));
            }).then(function() { window.location.reload(); });
          } else {
            window.location.reload();
          }
        } else {
          sessionStorage.removeItem('openbin-sw-recovery');
        }
      }, 5000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
